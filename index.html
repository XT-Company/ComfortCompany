<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comfort Company - Gmail Portal</title>
    <style>
        /* Базовые стили для темной темы, как на ваших скриншотах */
        body {
            background-color: #111;
            color: #e8eaed;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .email-item {
            background-color: #202124;
            padding: 15px;
            margin-bottom: 8px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid #3c4043;
            transition: background-color 0.2s;
        }
        .email-item:hover {
            background-color: #303134;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            background: #303134;
            border: 1px solid #5f6368;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Gmail Portal</h1>

    <div id="authBlock" style="margin-bottom: 20px;">
        <button id="loginBtn" onclick="handleAuthClick()" style="padding: 10px 20px; background-color: #4285f4; color: white; border: none; border-radius: 4px;">Войти через Google</button>
        <button id="logoutBtn" onclick="handleSignoutClick()" style="display: none; padding: 10px 20px; background-color: #d93025; color: white; border: none; border-radius: 4px;">Выйти</button>
    </div>

    <div id="portalContent" style="display: none;">
        <button id="composeBtn" onclick="openComposeModal()" style="padding: 12px 24px; background-color: #1a73e8; color: white; border: none; border-radius: 4px; margin-bottom: 20px; font-size: 15px;">
          ✏️ Написать письмо
        </button>

        <h3>Ваши входящие сообщения:</h3>
        <div id="emailListContainer">
            <p style="color: #9aa0a6;">Загрузка писем...</p>
        </div>
    </div>
</div>

<div id="composeModal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7);">
  <div style="background-color: #202124; color: white; margin: 10% auto; padding: 25px; width: 500px; border-radius: 8px; border: 1px solid #5f6368; box-shadow: 0 4px 16px rgba(0,0,0,0.5);">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
      <h3 style="margin: 0;">Новое сообщение</h3>
      <button onclick="closeComposeModal()" style="background: none; border: none; color: white; cursor: pointer; font-size: 18px;">✕</button>
    </div>
    <input type="email" id="emailTo" placeholder="Кому (Email)*" required>
    <input type="text" id="emailSubject" placeholder="Тема">
    <textarea id="emailBody" placeholder="Текст сообщения..." rows="8" style="resize: vertical;"></textarea>
    
    <input type="file" id="emailFiles" multiple style="margin-bottom: 15px; display: block; color: #e8eaed; background: none; border: none; padding: 0;">
    
    <div style="text-align: right;">
      <button onclick="sendEmail()" style="padding: 10px 20px; background-color: #1a73e8; color: white; border: none; border-radius: 4px;">Отправить</button>
    </div>
  </div>
</div>

<div id="viewModal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7);">
  <div style="background-color: #202124; color: white; margin: 5% auto; padding: 25px; width: 650px; border-radius: 8px; border: 1px solid #5f6368; max-height: 80vh; overflow-y: auto; box-shadow: 0 4px 16px rgba(0,0,0,0.5);">
    <div style="text-align: right;">
      <button onclick="closeViewModal()" style="background: none; border: none; color: white; cursor: pointer; font-size: 18px;">✕</button>
    </div>
    
    <div id="emailDetails">
      <h2 id="viewSubject" style="margin-top: 0; color: #fff;">Тема письма</h2>
      <p><strong>От:</strong> <span id="viewFrom" style="color: #8ab4f8;"></span></p>
      <p><strong>Дата:</strong> <span id="viewDate" style="color: #9aa0a6;"></span></p>
      <hr style="border: 0.5px solid #3c4043; margin: 15px 0;">
      <div id="viewBody" style="white-space: pre-wrap; background: #303134; padding: 15px; border-radius: 4px; min-height: 120px; border: 1px solid #3c4043;">Содержимое...</div>
    </div>

    <button id="replyActionBtn" onclick="showReplyForm()" style="margin-top: 15px; padding: 10px 20px; background-color: #3c4043; color: white; border: 1px solid #5f6368; border-radius: 4px;">↩️ Ответить</button>

    <div id="replyForm" style="display: none; margin-top: 15px; border-top: 1px solid #3c4043; padding-top: 15px;">
      <h3>Быстрый ответ</h3>
      <textarea id="replyBody" placeholder="Напишите ваш ответ здесь..." rows="6" style="resize: vertical;"></textarea>
      <div style="text-align: right;">
        <button onclick="sendReply()" style="padding: 10px 20px; background-color: #1a73e8; color: white; border: none; border-radius: 4px;">Отправить ответ</button>
      </div>
    </div>
  </div>
</div>

<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

<script>
  // Точные рабочие настройки вашего приложения
  const CLIENT_ID = '565975442884-sea3ig36td6ofhsd2932oo8rjcp7j5kl.apps.googleusercontent.com';
  const SCOPES = 'https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/gmail.send';

  let tokenClient;
  let gapiInited = false;
  let gisInited = false;
  let currentActiveEmail = null; // Хранит выбранное письмо для ответа

  function gapiLoaded() { gapi.load('client', intializeGapiClient); }
  async function intializeGapiClient() {
    await gapi.client.init({ apiKey: '', discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/gmail/v1/rest'] });
    gapiInited = true;
    maybeEnableButtons();
  }
  function gisLoaded() {
    tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: '', });
    gisInited = true;
    maybeEnableButtons();
  }
  function maybeEnableButtons() { if (gapiInited && gisInited) { console.log('Google API успешно загружен'); } }

  function handleAuthClick() {
    tokenClient.callback = async (resp) => {
      if (resp.error !== undefined) { throw (resp); }
      document.getElementById('loginBtn').style.display = 'none';
      document.getElementById('logoutBtn').style.display = 'inline-block';
      document.getElementById('portalContent').style.display = 'block';
      await listMessages();
    };
    if (gapi.client.getToken() === null) { tokenClient.requestAccessToken({prompt: 'consent'}); } 
    else { tokenClient.requestAccessToken({prompt: ''}); }
  }

  function handleSignoutClick() {
    const token = gapi.client.getToken();
    if (token !== null) {
      google.accounts.oauth2.revoke(token.access_token);
      gapi.client.setToken(null);
      document.getElementById('loginBtn').style.display = 'inline-block';
      document.getElementById('logoutBtn').style.display = 'none';
      document.getElementById('portalContent').style.display = 'none';
    }
  }

  // Загрузка списка писем
  async function listMessages() {
    try {
      const response = await gapi.client.gmail.users.messages.list({ 'userId': 'me', 'maxResults': 10 });
      const messages = response.result.messages;
      const container = document.getElementById('emailListContainer');
      container.innerHTML = '';

      if (!messages || messages.length === 0) {
        container.innerHTML = '<p>Писем не найдено.</p>';
        return;
      }

      for (let i = 0; i < messages.length; i++) {
        const msgDetails = await gapi.client.gmail.users.messages.get({ 'userId': 'me', 'id': messages[i].id });
        const msg = msgDetails.result;
        
        // Извлекаем заголовки темы, даты и отправителя
        const headers = msg.payload.headers;
        const subject = headers.find(h => h.name === 'Subject')?.value || '(Без темы)';
        const from = headers.find(h => h.name === 'From')?.value || 'Неизвестно';
        const date = headers.find(h => h.name === 'Date')?.value || '';
        const messageId = headers.find(h => h.name === 'Message-ID')?.value || '';

        // Извлекаем тело письма (упрощенный разбор)
        let body = '';
        if (msg.payload.body.data) {
          body = decodeBase64(msg.payload.body.data);
        } else if (msg.payload.parts) {
          const textPart = msg.payload.parts.find(p => p.mimeType === 'text/plain' || p.mimeType === 'text/html');
          if (textPart && textPart.body.data) { body = decodeBase64(textPart.body.data); }
        }

        // Создаем структуру объекта для нашего модального окна просмотра
        const emailObject = { id: msg.id, threadId: msg.threadId, messageId: messageId, subject: subject, from: from, date: date, body: body };

        // Рендерим элемент списка
        const row = document.createElement('div');
        row.className = 'email-item';
        row.innerHTML = `<strong>${from}</strong><br><span style="color:#b2b9c0;">${subject}</span>`;
        row.onclick = () => openViewModal(emailObject);
        container.appendChild(row);
      }
    } catch (err) {
      document.getElementById('emailListContainer').innerHTML = 'Ошибка загрузки писем: ' + err.message;
    }
  }

  function decodeBase64(data) {
    return decodeURIComponent(escape(atob(data.replace(/-/g, '+').replace(/_/g, '/'))));
  }

  // --- ЛОГИКА ОКНА "НАПИСАТЬ ПИСЬМО" ---
  function openComposeModal() { document.getElementById('composeModal').style.display = 'block'; }
  function closeComposeModal() {
    document.getElementById('composeModal').style.display = 'none';
    document.getElementById('emailTo').value = '';
    document.getElementById('emailSubject').value = '';
    document.getElementById('emailBody').value = '';
    document.getElementById('emailFiles').value = '';
  }

  async function sendEmail() {
    const to = document.getElementById('emailTo').value;
    const subject = document.getElementById('emailSubject').value;
    const body = document.getElementById('emailBody').value;

    if (!to) { alert("Укажите получателя в поле 'Кому'!"); return; }

    const emailContent = [
      `To: ${to}`,
      `Subject: =?utf-8?B?${btoa(unescape(encodeURIComponent(subject)))}?=`,
      'Content-Type: text/html; charset="UTF-8"',
      '',
      body
    ].join('\n');

    const base64EncodedEmail = btoa(unescape(encodeURIComponent(emailContent))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

    try {
      await gapi.client.gmail.users.messages.send({ 'userId': 'me', 'resource': { 'raw': base64EncodedEmail } });
      alert('Письмо отправлено успешно!');
      closeComposeModal();
      setTimeout(listMessages, 1500); // Обновляем список через 1.5 сек
    } catch (error) {
      alert('Ошибка при отправке: ' + error.message);
    }
  }

  // --- ЛОГИКА ПРОСМОТРА И ОТВЕТА ---
  function openViewModal(email) {
    currentActiveEmail = email;
    document.getElementById('viewSubject').innerText = email.subject;
    document.getElementById('viewFrom').innerText = email.from;
    document.getElementById('viewDate').innerText = email.date;
    document.getElementById('viewBody').innerHTML = email.body || '<span style="color:#grey;">(Пустое тело письма)</span>';

    document.getElementById('replyForm').style.display = 'none';
    document.getElementById('replyActionBtn').style.display = 'inline-block';
    document.getElementById('replyBody').value = '';
    document.getElementById('viewModal').style.display = 'block';
  }

  function closeViewModal() { document.getElementById('viewModal').style.display = 'none'; currentActiveEmail = null; }
  function showReplyForm() {
    document.getElementById('replyForm').style.display = 'block';
    document.getElementById('replyActionBtn').style.display = 'none';
  }

  async function sendReply() {
    if (!currentActiveEmail) return;
    const replyBodyText = document.getElementById('replyBody').value;
    if (!replyBodyText) { alert('Напишите текст ответа!'); return; }

    const to = currentActiveEmail.from;
    const subject = currentActiveEmail.subject.startsWith('Re:') ? currentActiveEmail.subject : `Re: ${currentActiveEmail.subject}`;
    
    let emailContentArr = [
      `To: ${to}`,
      `Subject: =?utf-8?B?${btoa(unescape(encodeURIComponent(subject)))}?=`,
      'Content-Type: text/html; charset="UTF-8"',
    ];

    if (currentActiveEmail.messageId) {
      emailContentArr.push(`In-Reply-To: ${currentActiveEmail.messageId}`);
      emailContentArr.push(`References: ${currentActiveEmail.messageId}`);
    }
    emailContentArr.push('', replyBodyText);

    const emailContent = emailContentArr.join('\n');
    const base64EncodedEmail = btoa(unescape(encodeURIComponent(emailContent))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

    try {
      await gapi.client.gmail.users.messages.send({
        'userId': 'me',
        'resource': { 'raw': base64EncodedEmail, 'threadId': currentActiveEmail.threadId }
      });
      alert('Ответ успешно отправлен!');
      closeViewModal();
    } catch (error) {
      alert('Не удалось отправить ответ: ' + error.message);
    }
  }
</script>
</body>
</html>
